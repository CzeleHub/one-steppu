[[lessons]]
title = "Vim - Find Character on Line"
code = "background-color: rgba(255, 128, 0, 0.5);"
input = ["f", ",", "f", ",", "F", ",", ";"]
cursor = [0, 0]
language = "ace/mode/css"
keys = [
{ value = "f", tooltip = "jump to next occurrence of a character (type f then the character)" },
{ value = "F", tooltip = "jump to previous occurrence of a character (type F then the character)" },
{ value = ";", tooltip = "repeat previous f, t, F or T movement" },
]

