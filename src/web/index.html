<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/styles/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri App</title>
  <script src="/ace/src-min-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
  <script type="module" src="/scripts/main.js" defer></script>
</head>

<body>
  <main>
    <div class="menu-area">
      <span class="description text">Learn shortcuts in small daily steps!</span>
      <button id="options" popovertarget="app-options" popovertargetaction="toggle">Options</button>
      <app-options popover="auto" id="app-options">
        <div class="options-container">
          <button class="check-button">
            <label>Run on system startup <input type="checkbox" id="autostart"></label>
          </button>
          <span>TODO lesson speed 0.5x 1x 1.5x</span>
        </div>
      </app-options>
    </div>
    <div class="lesson-title">
      <span class="text"></span>
    </div>
    <span class="lesson-instruction text" id="instruction"></span>
    <div class="lesson-toolbar">
      <!-- <button id="change-speed"></button> -->
      <button id="switch-editors">Try it out</button>
    </div>
    <div class="editors-area">
      <div class="editor-lesson-area area">
        <div class="lesson-info">
          <div class="show-input-lesson"></div>
        </div>
        <pre id="editor-lesson" class="disabled"></pre>
      </div>
      <div class="editor-user-area area">
        <div class="user-info">
          <div class="show-input-user"></div>
          <span class="vim-mode" id="mode-user"></span>
        </div>
        <pre id="editor-user"></pre>
      </div>
    </div>
    <div class="footer">
      <button id="reset">Reset</button>
      <div>
        <button id="previous">Previous</button>
        <button id="next">Next</button>
      </div>
    </div>
  </main>
</body>

</html>
