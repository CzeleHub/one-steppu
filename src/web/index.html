<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/styles/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri App</title>
  <script src="/ace/src-min-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
  <script type="module" src="/scripts/main.js" defer></script>
</head>

<body>
  <main>
    <div class="menu-area">
      <span class="description text">Learn shortcuts in small daily steps!</span>
      <button>TODO Options</button>
    </div>
    <div class="lesson-title">
      <span class="text"></span>
    </div>
    <span class="lesson-instruction text" id="instruction"></span>
    <div class="playground-info">
      <div class="show-input-user"></div>
      <span class="vim-mode" id="mode-user"></span>
    </div>
    <div class="lesson-info">
      <div class="show-input-tutorial"></div>
    </div>
    <div class="editor-playground-area">
      <pre id="editor-playground"></pre>
    </div>
    <div class="editor-showcase-area" >
      <pre id="editor-showcase" class="disabled"></pre>
    </div>
    <div class="footer"><button id="reset">Reset</button><button id="previous">Previous</button><button disabled id="next">Next</button></div>
  </main>
</body>

</html>
