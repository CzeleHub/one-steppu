<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="stylesheet" href="/styles/styles.css" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tauri App</title>
  <script src="/ace/src-min-noconflict/ace.js" type="text/javascript" charset="utf-8"></script>
  <script type="module" src="/scripts/main.js" defer></script>
</head>

<body>
  <main>
    <div class="menu-area">
      <span class="description text">Learn shortcuts in small daily steps!</span>
      <button id="options" popovertarget="app-options" popovertargetaction="toggle">Options</button>
      <app-options popover="auto" id="app-options">
        <div class="options-container">
          <button class="check-button" id="autostart">
            <label>Run on system startup<input type="checkbox"></label>
          </button>
          <!-- <button class="check-button" id="devtools">
            <label>Enable devtools<input type="checkbox"></label>
          </button> -->
        </div>
      </app-options>
    </div>
    <div class="lesson-area">
      <div class="lesson-information">
        <div class="lesson-title">
          <span class="text"></span>
        </div>
        <div class="lesson-instruction" id="instruction"></div>
        <div><span>After successful training please feel free to use confetti button for self gratification</span></div>
      </div>
      <div class="lesson-toolbar">
        <button id="confetti">Deploy confetti</button>
        <input type="radio" name="choice" id="radio-user">
        <label for="radio-user" class="radio-button" id="switch-to-editor"><img src="/assets/text.png" alt=""></label>
        <!-- <button id="switch-to-editor" for="btn1" type="image"><img src="/assets/text.png" alt=""></button> -->
        <input type="radio" name="choice" id="radio-lesson" checked>
        <label for="radio-lesson" class="radio-button" id="switch-to-lesson"><img src="/assets/lesson.png"
            alt=""></label>
        <!-- <button id="switch-to-lesson"  type="image"><img src="/assets/lesson.png" alt=""></button> -->
      </div>
    </div>
    <div class="editors-area">
      <div class="editor-user-area area">
        <div class="user-info">
          <div class="show-input-user"></div>
          <span class="vim-mode" id="mode-user"></span>
        </div>
        <pre id="editor-user"></pre>
      </div>
      <div class="editor-lesson-area area">
        <div class="lesson-info">
          <div class="show-input-lesson"></div>
        </div>
        <pre id="editor-lesson" class="disabled"></pre>
      </div>
    </div>
    <div class="footer">
      <button id="reset">Reset</button>
      <div>
        <button id="previous">Previous</button>
        <button id="next">Next</button>
      </div>
    </div>
  </main>
</body>

</html>
